# acl.conf
# Topic-level access control. With `allow_anonymous false` set in
# mosquitto.conf, every client must authenticate as one of these users,
# and is then restricted to exactly what's listed below - nothing more.

# Devices may only PUBLISH their own telemetry. They cannot subscribe to
# anything, which means a compromised device cannot eavesdrop on other
# vehicles' locations or read the alerts stream.
user device_client
topic write fleet/location/#

# The backend needs to read all device telemetry, and both read and write
# the alerts topic (it publishes new alerts, and could itself subscribe to
# them for chaining into another service, e.g. a notifications worker).
user backend_service
topic read fleet/location/#
topic readwrite fleet/alerts
