# mosquitto.conf
# Run this from INSIDE the mosquitto/ directory so the relative paths below
# resolve correctly:
#   cd mosquitto && mosquitto -c mosquitto.conf
#
# This replaces the old "anyone on port 1883 can read/write anything"
# default with: TLS-only, authenticated, per-topic ACL-restricted.

# --- Plaintext listener: DISABLED ---
# We do not open port 1883 at all anymore. Everything goes over TLS on 8883.
# (If you need a plaintext listener for local debugging with mosquitto_sub,
# add `listener 1883` + `allow_anonymous true` back temporarily - never in
# anything reachable outside your own machine.)

listener 8883
cafile certs/ca.crt
certfile certs/server.crt
keyfile certs/server.key
tls_version tlsv1.2

# Require every client to authenticate with a username/password (set up via
# setup_auth.sh). No anonymous connections allowed at all.
allow_anonymous false
password_file passwd

# Enforce the per-user topic restrictions defined in acl.conf.
acl_file acl.conf

# Reasonable operational defaults
persistence true
persistence_location ./data/
log_dest stdout
log_type error
log_type warning
log_type notice
